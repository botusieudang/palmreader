<!DOCTYPE html>

<meta charset="UTF-8">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0e0e1a; color:#e0e0e0; font-family:'Segoe UI',sans-serif; padding:16px; }
h1 { text-align:center; color:#c084fc; margin-bottom:8px; font-size:20px; }
.tabs { display:flex; gap:8px; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
.tab { padding:8px 16px; border-radius:8px; cursor:pointer; border:1px solid #333; background:#1a1a2e; font-size:13px; transition:all .2s; }
.tab:hover { border-color:#666; }
.tab.active { border-color:var(--accent); background:color-mix(in srgb, var(--accent) 15%, #1a1a2e); color:var(--accent); font-weight:600; }
.section-tabs { display:flex; gap:6px; justify-content:center; margin-bottom:16px; }
.section-tab { padding:6px 14px; border-radius:20px; cursor:pointer; border:1px solid #333; background:#1a1a2e; font-size:12px; }
.section-tab.active { border-color:var(--section-color); color:var(--section-color); background:color-mix(in srgb, var(--section-color) 12%, #1a1a2e); }
.editor-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:900px; margin:0 auto; }
.option-card { background:#13131f; border:1px solid #2a2a3a; border-radius:12px; padding:12px; }
.option-card.selected { border-color:var(--accent); box-shadow:0 0 12px color-mix(in srgb, var(--accent) 30%, transparent); }
.option-label { font-size:12px; color:#aaa; margin-bottom:6px; }
.option-label strong { color:#e0e0e0; }
svg.canvas { width:100%; background:#0a0a14; border-radius:8px; cursor:crosshair; }
.controls { max-width:900px; margin:12px auto 0; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.controls button { padding:6px 14px; border-radius:8px; border:1px solid #444; background:#1e1e30; color:#e0e0e0; cursor:pointer; font-size:12px; }
.controls button:hover { border-color:#888; background:#2a2a42; }
.controls button.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
.path-input { flex:1; min-width:200px; padding:6px 10px; border-radius:8px; border:1px solid #444; background:#0e0e1a; color:#e0e0e0; font-family:monospace; font-size:11px; }
.export-area { max-width:900px; margin:16px auto; }
.export-area textarea { width:100%; height:200px; background:#0a0a14; color:#c084fc; border:1px solid #333; border-radius:8px; padding:10px; font-family:monospace; font-size:11px; resize:vertical; }
.info { max-width:900px; margin:8px auto; font-size:11px; color:#666; text-align:center; }
.cp { r:5; fill:#fff; stroke:var(--accent); stroke-width:1.5; cursor:grab; }
.cp:hover { r:7; }
.cp.dragging { r:7; fill:var(--accent); }
</style>
</head>
<body>

<p class="info">Chọn section &rarr; chọn câu hỏi &rarr; kéo thả control points trên từng option. Nhấn "Export Code" để lấy code mới.</p>

}

  ).join('');
}

function parsePath(d) {
  // Parse SVG path into points array: [{type:'M'|'Q'|'L', coords:[x,y,...]}]
  const tokens = d.trim().split(/\s+/);
  const pts = [];
  let i = 0;
  while (i < tokens.length) {
    const cmd = tokens[i];
    if (cmd === 'M' || cmd === 'L') {
      pts.push({ type: cmd, coords: [parseFloat(tokens[i+1]), parseFloat(tokens[i+2])] });
      i += 3;
    } else if (cmd === 'Q') {
      pts.push({ type: 'Q', coords: [parseFloat(tokens[i+1]), parseFloat(tokens[i+2]), parseFloat(tokens[i+3]), parseFloat(tokens[i+4])] });
      i += 5;
    } else if (cmd === 'Z') {
      pts.push({ type: 'Z', coords: [] });
      i++;
    } else {
      i++;
    }
  }
  return pts;
}

function buildPath(pts) {
  return pts.map(p => {
    if (p.type === 'Z') return 'Z';
    return p.type + ' ' + p.coords.map(c => Math.round(c)).join(' ');
  }).join(' ');
}

function getControlPoints(pts) {
  // Return array of draggable points: { ptIdx, coordIdx, x, y, label }
  const cps = [];
  pts.forEach((p, idx) => {
    if (p.type === 'M' || p.type === 'L') {
      cps.push({ ptIdx: idx, coordIdx: 0, x: p.coords[0], y: p.coords[1], label: p.type });
    } else if (p.type === 'Q') {
      cps.push({ ptIdx: idx, coordIdx: 0, x: p.coords[0], y: p.coords[1], label: 'CP' });
      cps.push({ ptIdx: idx, coordIdx: 2, x: p.coords[2], y: p.coords[3], label: 'Q' });
    }
  });
  return cps;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const q = QUIZ_DATA[currentSection][currentQIdx];
  const accent = getAccentColor();
  document.body.style.setProperty('--accent', accent);

  grid.innerHTML = q.options.map((opt, oi) => {
    const isSelected = oi === selectedOptionIdx;
    return `<div class="option-card ${isSelected?'selected':''}" style="--accent:${accent}" onclick="selectOption(${oi})">
      <div class="option-label"><strong>${String.fromCharCode(65+oi)}.</strong> ${opt.label}</div>
      <svg class="canvas" id="svg_${oi}" viewBox="0 0 300 320"
           onmousedown="startDrag(event,${oi})" onmousemove="onDrag(event,${oi})" onmouseup="endDrag(event)" onmouseleave="endDrag(event)"
           ontouchstart="startDrag(event,${oi})" ontouchmove="onDrag(event,${oi})" ontouchend="endDrag(event)">
        <!-- Hand outline -->
        <path d="${BASE_HAND_PATH}" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- Dimmed reference lines -->
        ${Object.entries(REF_LINES).filter(([k]) => k !== currentSection).map(([k, l]) =>
          `<path d="${l.d}" fill="none" stroke="${l.color}" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>`
        ).join('')}
        <!-- Option paths -->
        ${opt.paths.map((p, pi) => {
          const op = p.opacity !== undefined ? p.opacity : 1;
          const pathColor = p.refLine ? (REF_LINES[p.refLine]?.color || accent) : accent;
          return `<path d="${p.d}" fill="none" stroke="${pathColor}" stroke-width="2.5" stroke-linecap="round" opacity="${op}" data-opt="${oi}" data-path="${pi}"/>`;
        }).join('')}
        <!-- Control points (only for selected option) -->
        ${isSelected ? opt.paths.map((p, pi) => {
          const parsed = parsePath(p.d);
          const cps = getControlPoints(parsed);
          return cps.map(cp =>
            `<circle class="cp" cx="${cp.x}" cy="${cp.y}" data-opt="${oi}" data-path="${pi}" data-ptidx="${cp.ptIdx}" data-coordidx="${cp.coordIdx}" style="--accent:${accent}"/>`
          ).join('');
        }).join('') : ''}
      </svg>
    </div>`;
  }).join('');
}

function selectSection(id) {
  currentSection = id;
  currentQIdx = 0;
  selectedOptionIdx = 0;
  renderSectionTabs();
  renderQuestionTabs();
  renderGrid();
}

function selectQuestion(i) {
  currentQIdx = i;
  selectedOptionIdx = 0;
  renderQuestionTabs();
  renderGrid();
}

function selectOption(i) {
  selectedOptionIdx = i;
  renderGrid();
}

function getSVGPoint(evt, svgEl) {
  const pt = svgEl.createSVGPoint();
  const touch = evt.touches ? evt.touches[0] : evt;
  pt.x = touch.clientX;
  pt.y = touch.clientY;
  const svgPt = pt.matrixTransform(svgEl.getScreenCTM().inverse());
  return { x: svgPt.x, y: svgPt.y };
}

function startDrag(evt, optIdx) {
  const target = evt.target;
  if (!target.classList.contains('cp')) return;
  evt.preventDefault();
  const pi = parseInt(target.dataset.path);
  const ptIdx = parseInt(target.dataset.ptidx);
  const coordIdx = parseInt(target.dataset.coordidx);
  dragging = { optIdx, pathIdx: pi, ptIdx, coordIdx };
  target.classList.add('dragging');
}

function onDrag(evt, optIdx) {
  if (!dragging || dragging.optIdx !== optIdx) return;
  evt.preventDefault();
  const { pathIdx, ptIdx, coordIdx } = dragging;

  // Always get fresh SVG element from DOM (never use stale reference)
  const svgEl = document.getElementById(`svg_${optIdx}`);
  if (!svgEl) return;
  const pos = getSVGPoint(evt, svgEl);

  const q = QUIZ_DATA[currentSection][currentQIdx];
  const pathObj = q.options[optIdx].paths[pathIdx];
  const parsed = parsePath(pathObj.d);

  parsed[ptIdx].coords[coordIdx] = pos.x;
  parsed[ptIdx].coords[coordIdx + 1] = pos.y;

  pathObj.d = buildPath(parsed);

  // Update DOM directly without full re-render (avoids stale element issues)
  // Update the path element
  const pathEls = svgEl.querySelectorAll(`path[data-opt="${optIdx}"][data-path="${pathIdx}"]`);
  pathEls.forEach(el => el.setAttribute('d', pathObj.d));

  // Update all control points for this path
  const allParsed = parsePath(pathObj.d);
  const cps = getControlPoints(allParsed);
  const cpEls = svgEl.querySelectorAll(`circle[data-opt="${optIdx}"][data-path="${pathIdx}"]`);
  cpEls.forEach((el, i) => {
    if (cps[i]) {
      el.setAttribute('cx', cps[i].x);
      el.setAttribute('cy', cps[i].y);
    }
  });
}

function endDrag(evt) {
  if (dragging) {
    dragging = null;
    document.querySelectorAll('.cp.dragging').forEach(el => el.classList.remove('dragging'));
  }
}

function resetCurrent() {
  const orig = ORIGINAL_DATA[currentSection][currentQIdx];
  QUIZ_DATA[currentSection][currentQIdx] = JSON.parse(JSON.stringify(orig));
  renderGrid();
}

function resetAll() {
  Object.keys(QUIZ_DATA).forEach(k => {
    QUIZ_DATA[k] = JSON.parse(JSON.stringify(ORIGINAL_DATA[k]));
  });
  renderGrid();
}

function exportCode() {
  let code = '';

  Object.entries(QUIZ_DATA).forEach(([sectionId, questions]) => {
    const sectionName = SECTIONS.find(s => s.id === sectionId)?.name || sectionId;
    code += `// ==================== ${sectionName} (${sectionId}) ====================\n`;

    questions.forEach(q => {
      code += `// ${q.id}: ${q.text}\n`;
      q.options.forEach(opt => {
        const pathsStr = opt.paths.map(p => {
          let obj = `{ d: '${p.d}'`;
          if (p.opacity !== undefined) obj += `, opacity: ${p.opacity}`;
          obj += ' }';
          return obj;
        }).join(',\n          ');
        code += `  ${opt.id}: linePaths: [${pathsStr}]\n`;
      });
      code += '\n';
    });
  });

  const el = document.getElementById('exportArea');
  el.style.display = 'block';
  document.getElementById('exportText').value = code;

  // Also build a copy-paste ready version for palmQuizData.ts
  let tsCode = '// === COPY-PASTE vào palmQuizData.ts ===\n\n';

  Object.entries(QUIZ_DATA).forEach(([sectionId, questions]) => {
    questions.forEach(q => {
      q.options.forEach(opt => {
        const pathsStr = opt.paths.map(p => {
          let obj = `{ d: '${p.d}'`;
          if (p.opacity !== undefined) obj += `, opacity: ${p.opacity}`;
          obj += ' }';
          return obj;
        }).join(', ');
        tsCode += `// ${opt.id} (${opt.label})\nlinePaths: [${pathsStr}],\n\n`;
      });
    });
  });

  document.getElementById('exportText').value = tsCode;
}

// Init
renderSectionTabs();
renderQuestionTabs();
renderGrid();
</script>
